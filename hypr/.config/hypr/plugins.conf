# hyprscrolling plugin settings (Hyprland plugin namespace syntax)
plugin:hyprscrolling:column_width = 0.5
plugin:hyprscrolling:fullscreen_on_one_column = true

bind = SUPER SHIFT, minus, layoutmsg, colresize -conf
bind = SUPER SHIFT, equal, layoutmsg, colresize +conf
bind = SUPER, period, layoutmsg, movewindowto r
bind = SUPER, comma, layoutmsg, movewindowto l
