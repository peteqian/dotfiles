# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale
# You must relaunch Hyprland after changing any envs (use Super+Esc, then Relaunch)

# Optimized for retina-class 2x displays, like 13" 2.8K, 27" 5K, 32" 6K.
# env = GDK_SCALE,2
# monitor=,preferred,auto,auto

# Good compromise for 27" or 32" 4K monitors (but fractional!)
# env = GDK_SCALE,1.75
# monitor=,preferred,auto,1.666667

# Straight 1x setup for low-resolution displays like 1080p or 1440p
# env = GDK_SCALE,1
# monitor=,preferred,auto,1

# Example for Framework 13 w/ 6K XDR Apple display
# monitor = DP-5, 6016x3384@60, auto, 2
# monitor = eDP-1, 2880x1920@120, auto, 2

monitor=eDP-2,preferred,auto,1.33 # framework internal dispaly
monitor=DP-1,preferred,0x-160,1 # external display and positioned slightly below

# monitor=eDP-2,preferred,auto,1.6 # framework internal dispaly
# monitor=DP-1,preferred,auto,1 # external display and positioned slightly below

# Pin workspaces to specific monitors
# 1–6 on external display (DP-1), 7–10 on internal display (eDP-2)
# Make them persistent so they always exist and set first on each as default
workspace = 1, monitor:DP-1, persistent:true, default:true
workspace = 2, monitor:DP-1, persistent:true
workspace = 3, monitor:DP-1, persistent:true
workspace = 4, monitor:DP-1, persistent:true
workspace = 5, monitor:DP-1, persistent:true
workspace = 6, monitor:DP-1, persistent:true
workspace = 7, monitor:eDP-2, persistent:true, default:true
workspace = 8, monitor:eDP-2, persistent:true
workspace = 9, monitor:eDP-2, persistent:true
workspace = 10, monitor:eDP-2, persistent:true

# workspace = 1, monitor:eDP-2, persistent:true, default:true
# workspace = 2, monitor:eDP-2, persistent:true
# workspace = 3, monitor:eDP-2, persistent:true
# workspace = 4, monitor:eDP-2, persistent:true
# workspace = 5, monitor:eDP-2, persistent:true
# workspace = 6, monitor:eDP-2, persistent:true
# workspace = 7, monitor:DP-1, persistent:true, default:true
# workspace = 8, monitor:DP-1, persistent:true
# workspace = 9, monitor:DP-1, persistent:true
# workspace = 10, monitor:DP-1, persistent:true
