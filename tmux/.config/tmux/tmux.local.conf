# Local tmux overrides

# Move current window left/right with Ctrl+Shift+Arrow
bind-key -n C-S-Left swap-window -t -1 \; select-window -t -1
bind-key -n C-S-Right swap-window -t +1 \; select-window -t +1

# Prompt before killing the current window
unbind k
bind k confirm-before -p "Kill window '#W'? (y/n)" kill-window

# Toggle window layout between horizontal and vertical (prefix + t)
bind t run-shell 'state="$(tmux show-window-options -v @layout_toggle 2>/dev/null || echo vertical)"; if [ "$state" = "vertical" ]; then tmux select-layout even-horizontal; tmux set-window-option @layout_toggle horizontal; else tmux select-layout even-vertical; tmux set-window-option @layout_toggle vertical; fi'
