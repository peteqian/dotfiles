# tmux config entrypoint; split into focused files.
# Load order is explicit here (top to bottom).
source-file ~/.config/tmux/conf.d/core.conf
source-file ~/.config/tmux/conf.d/keybindings.conf
source-file ~/.config/tmux/conf.d/status-theme.conf
source-file ~/.config/tmux/conf.d/plugins.conf
source-file ~/.config/tmux/conf.d/local.conf
source-file ~/.config/tmux/conf.d/tpm.conf
